<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patriot Consulting</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Manrope:wght@700;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #f4f7fb;
  color: #0f1728;
}

.container {
  width: min(1180px, calc(100% - 32px));
  margin: 0 auto;
}

/* HEADER */
.header {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid rgba(0,0,0,0.05);
}

.header-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 0;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand-logo {
  width: 60px;
  height: 60px;
  border-radius: 14px;
  background: white;
  padding: 4px;
  box-shadow: 0 8px 18px rgba(0,0,0,0.1);
}

.brand-logo img {
  width: 100%;
}

.brand-title {
  font-family: 'Manrope';
  font-weight: 800;
}

.brand-sub {
  font-size: 12px;
  letter-spacing: 2px;
  color: #4f8edc;
  font-weight: 700;
}

nav a {
  margin-left: 24px;
  font-weight: 600;
  color: #475467;
  text-decoration: none;
}

/* HERO */
.hero {
  position: relative;
  padding: 100px 0;
  color: white;
  overflow: hidden;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background-image: url('./loudounHills-1024x768.jpg');
  background-size: cover;
  background-position: center;
  z-index: 1;
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    90deg,
    rgba(16,37,66,0.85) 0%,
    rgba(16,37,66,0.7) 40%,
    rgba(16,37,66,0.4) 70%,
    rgba(16,37,66,0.2) 100%
  );
  z-index: 2;
}

.hero-content {
  position: relative;
  z-index: 3;
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 30px;
}

.hero h1 {
  font-family: 'Manrope';
  font-size: 64px;
  margin: 0;
}

.hero p {
  margin-top: 20px;
  font-size: 18px;
  max-width: 500px;
  color: #dbeafe;
}

.btn {
  margin-top: 30px;
  padding: 14px 22px;
  border-radius: 10px;
  font-weight: 700;
  border: none;
  cursor: pointer;
}

.btn-primary {
  background: #4f8edc;
  color: white;
}

/* PANEL */
.panel {
  background: linear-gradient(135deg, #102542, #1f4778);
  border-radius: 24px;
  padding: 28px;
}

.panel-logo {
  width: 60px;
  margin-bottom: 10px;
}

.grid {
  margin-top: 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 14px;
  border-radius: 14px;
}

/* CONTACT */
.contact {
  padding: 80px 0;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
}
</style>
</head>

<body>

<header class="header">
  <div class="container header-inner">
    <div class="brand">
      <div class="brand-logo">
        <img src="./patriot_logo_full_color.png">
      </div>
      <div>
        <div class="brand-title">PATRIOT</div>
        <div class="brand-sub">CONSULTING</div>
      </div>
    </div>

    <nav>
      <a href="#contact">Contact</a>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>

  <div class="container hero-content">
    <div>
      <h1>Make your voice heard.</h1>
      <p>Clear messaging, smart strategy, and modern digital that actually works.</p>
      <button class="btn btn-primary">Start a conversation</button>
    </div>

    <div class="panel">
      <img src="./patriot_logo_white.png" class="panel-logo">

      <h2>Built for modern campaigns</h2>

      <div class="grid">
        <div class="card">Responsive</div>
        <div class="card">Experienced</div>
        <div class="card">Trusted</div>
        <div class="card">Modern Digital</div>
      </div>
    </div>
  </div>
</section>

<section id="contact" class="contact">
  <div class="container">
    <h2>Contact</h2>

    <form id="form">
      <input id="name" placeholder="Name" required>
      <input id="email" placeholder="Email" required>
      <textarea id="msg" placeholder="Message" required></textarea>
      <button class="btn btn-primary">Send</button>
    </form>
  </div>
</section>

<script>
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let msg = document.getElementById("msg").value;

  window.location.href =
    "mailto:dave@patriotconsultingva.com" +
    "?subject=Website Inquiry" +
    "&body=" +
    encodeURIComponent("Name: " + name + "\nEmail: " + email + "\n\n" + msg);
});
</script>

</body>
</html>
